<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Warning Lookup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Fair Warning Lookup</h1>
    <p class="subtitle">Check before you watch.</p>
  </header>

  <main>
    <div class="card">

      <div class="field">
        <label for="film-select">Film</label>
        <div class="select-wrapper">
          <select id="film-select">
            <option value="">-- Select a film --</option>
          </select>
        </div>
      </div>

      <div class="field" id="trigger-field">
        <label for="trigger-select">Event Warning</label>
        <div class="select-wrapper">
          <select id="trigger-select" disabled>
            <option value="">-- Select an event --</option>
          </select>
        </div>
      </div>

      <button id="check-btn" disabled>Check</button>

      <div id="result" class="result hidden" role="alert" aria-live="polite"></div>

      <button id="reset-btn" class="reset hidden">Start Over</button>

    </div>

    <div class="card browse-card">
      <h2>Browse All Events for a Film</h2>
      <div id="browse-list" class="browse-list">
        <p class="muted">Select a film above to see all its event information.</p>
      </div>
    </div>
  </main>

  <footer>
    <p>Spoiler-free trigger awareness. Data is community-sourced &mdash; always verify with sources like <strong><a href="https://www.doesthedogdie.com" target="_blank" rel="noopener noreferrer">DoesTheDogDie.com</a></strong>.</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
